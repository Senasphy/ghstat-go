version: 2
project_name: ghstat-go
before:
  hooks:
    - go mod tidy
    - go test ./...
builds:
  - id: ghstat-go
    main: ./cmd/ghstat-go
    binary: ghstat-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
archives:
  - id: default
    builds:
      - ghstat-go
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: checksums.txt
changelog:
  sort: desc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: ghstat-go
  draft: false
  prerelease: auto
